name: MDReader
options:
  bundleIdPrefix: com.alsheikhmedia
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  swift-cmark:
    url: https://github.com/swiftlang/swift-cmark
    from: "0.6.0"

targets:
  MDReader:
    type: application
    platform: macOS
    sources:
      - MDReader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alsheikhmedia.MDReader
        PRODUCT_NAME: MDReader
        MARKETING_VERSION: "3.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_CFBundleDisplayName: MDReader
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -Owholemodule
    dependencies:
      - package: swift-cmark
        product: cmark-gfm
      - package: swift-cmark
        product: cmark-gfm-extensions
    info:
      path: MDReader/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.markdown
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
                - mkd
